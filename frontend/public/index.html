<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16.png" />
    <link rel="alternate icon" href="%PUBLIC_URL%/favicon.ico" />
    <!-- viewport-fit=cover lets the page extend behind iPhone notch / home
         indicator (paired with the safe-* utilities in index.css).
         initial-scale=0.95 nudges the launch zoom slightly out (per owner
         feedback "page is a tiny bit zoomed in on launch"); minimum-scale=
         0.85 lets the browser settle a touch lower if the device's intrinsic
         width forces it; maximum-scale=5 still allows accessibility pinch-
         zoom for low-vision users. -->
    <!-- Zoom disabled completely:
         initial-scale=1     → no initial zoom on app launch
         minimum-scale=1     → can't pinch-zoom out
         maximum-scale=1     → can't pinch-zoom in
         user-scalable=no    → belt-and-suspenders (some iOS versions
                                  ignore the min/max combo without this)
         viewport-fit=cover  → page extends behind notch / home indicator -->
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <!-- Theme color = vibrant Aurora purple. iOS PWA uses this as the
         fallback bg for safe-area zones (status bar at top, home indicator
         at bottom) when the page doesn't paint there. Setting it to the
         Aurora vibrant purple makes the bottom home-indicator strip read
         as a continuation of Aurora's color, eliminating the "black bar
         at the bottom" symptom on iPhone 14 Pro PWA. -->
    <meta name="theme-color" content="#5A2AD4" />
    <!-- iPhone notch / Dynamic Island + home indicator fix —
         `apple-mobile-web-app-capable` puts the page into PWA / standalone
         mode when added to the home screen (no Safari URL bar).
         `apple-mobile-web-app-status-bar-style=black-translucent` makes the
         status bar bg TRANSPARENT — page content (Aurora) shows through
         behind the Dynamic Island. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>UniFlow Portal</title>
    <style>
      /* ════════════════════════════════════════════════════════════════
         UniFlow scan loader — boot splash. Renders before the React bundle
         parses so the user never sees a flash of blank. Theme is picked
         from localStorage.darkMode synchronously below so the right mode
         shows on first paint.

         ALL animation is CSS keyframes (no rAF) — that's what eliminates
         the stutter we'd see when the JS bundle parses concurrently with
         a JS-driven animation. CSS animations run on the compositor
         thread and can't be blocked by JS work on the main thread.

         Backgrounds match the in-app UniFlow look:
           dark  → 3 large drifting purple blobs (Aurora-flavored)
           light → 4 soft pastel blobs (mirrors LightModeBackground.tsx)
         ════════════════════════════════════════════════════════════════ */

      #app-loader {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
      }
      #app-loader.loaded {
        opacity: 0; pointer-events: none;
        transition: opacity .6s ease-out;
      }

      .uf-loader-stage {
        --uf-purple-light: #7B5AFF;
        --uf-purple-mid:   #6A3FF4;
        --uf-purple-deep:  #5A2AD4;
        --uf-purple-glow:      rgba(106, 63, 244, 0.57);
        --uf-purple-glow-soft: rgba(106, 63, 244, 0.35);
        --uf-bg: #0D0D0D;
        --uf-fg: #FFFFFF;
        /* Default scan width — JS overrides on mount once the wordmark is
           measured, so the bar always sweeps the exact letter span. */
        --uf-scan-right: 360px;

        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: var(--uf-bg);
        overflow: hidden;
        transition: background 250ms ease, color 250ms ease;
      }
      .uf-loader-stage.uf-light {
        --uf-bg: #FFFFFF;
        --uf-fg: #0A0A12;
      }

      /* ── background blobs ──────────────────────────────────────────
         A simple, GPU-cheap approximation of the in-app backgrounds:
         large soft-blurred radial gradients drifting slowly. */
      .uf-bg-layer {
        position: absolute; inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .uf-bg-blob {
        position: absolute; border-radius: 50%;
        filter: blur(60px);
        will-change: transform;
      }

      /* dark mode — Aurora-flavored purples */
      .uf-loader-stage:not(.uf-light) .uf-bg-blob-1 {
        top: -15%; left: -10%; width: 55vw; height: 55vw;
        background: radial-gradient(circle, rgba(122, 90, 255, 0.55) 0%, transparent 60%);
        animation: uf-bg-drift-1 14s ease-in-out infinite;
      }
      .uf-loader-stage:not(.uf-light) .uf-bg-blob-2 {
        top: -10%; right: -15%; width: 60vw; height: 60vw;
        background: radial-gradient(circle, rgba(90, 42, 212, 0.55) 0%, transparent 60%);
        animation: uf-bg-drift-2 18s ease-in-out infinite;
      }
      .uf-loader-stage:not(.uf-light) .uf-bg-blob-3 {
        bottom: -25%; left: 20%; width: 65vw; height: 65vw;
        background: radial-gradient(circle, rgba(168, 85, 247, 0.40) 0%, transparent 60%);
        animation: uf-bg-drift-3 16s ease-in-out infinite;
      }
      .uf-loader-stage:not(.uf-light) .uf-bg-blob-4 { display: none; }

      /* light mode — soft pastels (mirrors LightModeBackground.tsx) */
      .uf-loader-stage.uf-light .uf-bg-blob-1 {
        top: -25%; left: -10%; width: 60vw; height: 60vw;
        background: radial-gradient(circle, rgba(167, 139, 250, 0.55) 0%, transparent 60%);
        animation: uf-bg-drift-1 11s ease-in-out infinite;
      }
      .uf-loader-stage.uf-light .uf-bg-blob-2 {
        top: -20%; right: -12%; width: 55vw; height: 55vw;
        background: radial-gradient(circle, rgba(244, 114, 182, 0.40) 0%, transparent 60%);
        animation: uf-bg-drift-2 14s ease-in-out infinite;
      }
      .uf-loader-stage.uf-light .uf-bg-blob-3 {
        bottom: -30%; left: -10%; width: 65vw; height: 65vw;
        background: radial-gradient(circle, rgba(125, 211, 252, 0.45) 0%, transparent 60%);
        animation: uf-bg-drift-3 12s ease-in-out infinite;
      }
      .uf-loader-stage.uf-light .uf-bg-blob-4 {
        display: block;
        bottom: -25%; right: -12%; width: 60vw; height: 60vw;
        background: radial-gradient(circle, rgba(196, 181, 253, 0.50) 0%, transparent 60%);
        animation: uf-bg-drift-4 13s ease-in-out infinite;
      }

      @keyframes uf-bg-drift-1 {
        0%, 100% { transform: translate3d(0, 0, 0)        scale(1); }
        33%      { transform: translate3d(5vw, 4vh, 0)    scale(1.05); }
        66%      { transform: translate3d(-3vw, 6vh, 0)   scale(0.95); }
      }
      @keyframes uf-bg-drift-2 {
        0%, 100% { transform: translate3d(0, 0, 0)        scale(1); }
        50%      { transform: translate3d(-5vw, 4vh, 0)   scale(1.08); }
      }
      @keyframes uf-bg-drift-3 {
        0%, 100% { transform: translate3d(0, 0, 0)        scale(1); }
        40%      { transform: translate3d(4vw, -5vh, 0)   scale(0.92); }
        80%      { transform: translate3d(-2vw, -3vh, 0)  scale(1.06); }
      }
      @keyframes uf-bg-drift-4 {
        0%, 100% { transform: translate3d(0, 0, 0)        scale(1); }
        50%      { transform: translate3d(-4vw, -4vh, 0)  scale(1.04); }
      }

      .uf-loader-block {
        display: flex; flex-direction: column; align-items: center; gap: 16px;
        position: relative;
        z-index: 1;
      }

      /* graduation cap — shrunk to match the smaller wordmark below */
      .uf-grad-cap {
        position: absolute;
        top: -34px; left: -19px;
        width: 60px; height: 48px;
        z-index: 3;
        transform-origin: 50% 70%;
        /* drop-shadow on SVG can stutter on some GPUs; small radius keeps
           it cheap. translateZ pins it to its own compositor layer so the
           transform animation never re-rasterises the SVG. */
        filter: drop-shadow(0 4px 12px rgba(106, 63, 244, 0.35));
        will-change: transform, opacity;
        transform: translateZ(0);
        animation: uf-boot-cap 4s linear infinite;
      }
      .uf-loader-stage.uf-light .uf-grad-cap { filter: none; }

      .uf-tassel-string { stroke: white; }
      .uf-tassel-tuft   { fill:   white; }
      .uf-loader-stage.uf-light .uf-tassel-string { stroke: #0A0A12; }
      .uf-loader-stage.uf-light .uf-tassel-tuft   { fill:   #0A0A12; }

      /* wordmark — shrunk from 84px to 56px (~67%) per design feedback.
         Loader-block already centers children via `align-items: center`,
         so the smaller wordmark stays horizontally centered. The worm
         loader below uses its own explicit sizing and isn't affected. */
      .uf-loader {
        position: relative;
        font-size: 56px;
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "SF Pro Display", Roboto, system-ui, sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1;
        padding: 0 2px;
      }
      .uf-word {
        display: inline-block;
        will-change: clip-path;
        animation: uf-boot-word 4s linear infinite;
      }
      .uf-purple {
        background: linear-gradient(135deg, #7B5AFF 0%, #6A3FF4 50%, #5A2AD4 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .uf-fg { color: var(--uf-fg); }
      /* The period after "Flow" sits with the font's natural right-bearing
         after "w", which reads as a gap at 84px. Pull it leftward so it
         hugs the w. */
      .uf-dot { margin-left: -0.12em; }

      /* scan bars */
      .uf-scan-bar, .uf-scan-bar-blur {
        position: absolute;
        top: -50px; left: 0;
        pointer-events: none;
        will-change: transform;
        animation: uf-boot-scan 4s linear infinite;
      }
      .uf-scan-bar {
        width: 5px;
        height: calc(100% + 50px);
        background: var(--uf-purple-mid);
        box-shadow: 0 0 12px var(--uf-purple-glow), 0 0 24px var(--uf-purple-glow-soft);
        filter: opacity(0.95);
        border-radius: 4px;
        z-index: 2;
      }
      .uf-scan-bar-blur {
        width: 8px;
        height: calc(100% + 50px);
        background: var(--uf-purple-glow);
        filter: blur(10px);
        border-radius: 4px;
        z-index: 0;
      }

      /* ── animation keyframes ───────────────────────────────────────
         4-second cycle, 4 scan passes per cycle. Word clips left→right
         during pass 1, both edges shift during pass 2, recovers from
         left during pass 3, then rests. Cap is erased L→R alongside the
         word, vanishes, then spring-drops back in. */
      @keyframes uf-boot-scan {
        0%   { transform: translateX(-36px); }
        25%  { transform: translateX(var(--uf-scan-right)); }
        50%  { transform: translateX(-36px); }
        75%  { transform: translateX(var(--uf-scan-right)); }
        100% { transform: translateX(-36px); }
      }
      @keyframes uf-boot-word {
        0%     { clip-path: inset(0 0 0 0%); }
        25%    { clip-path: inset(0 0 0 100%); }
        37.5%  { clip-path: inset(0 50% 0 50%); }
        50%    { clip-path: inset(0 100% 0 0); }
        75%    { clip-path: inset(0 0% 0 0); }
        100%   { clip-path: inset(0 0 0 0); }
      }
      @keyframes uf-boot-cap {
        /* 0–7%: opacity fades 1→0 to match the scan bar passing through
           the cap area. Bar reaches the cap's right edge at roughly 7%
           of the 4 s cycle (for a typical "UniFlow." width). No clip-path
           animation — clip-path on SVG is CPU-bound and was the stutter.
           Opacity + transform are GPU-accelerated and stay smooth. */
        0%    { transform: translateY(0) rotate(-15deg) scale(1) translateZ(0);
                opacity: 1; }
        7%    { transform: translateY(0) rotate(-15deg) scale(1) translateZ(0);
                opacity: 0; }
        /* 7–45%: parked above the frame, invisible, ready to drop */
        7.01% { transform: translateY(-80px) rotate(-15deg) scale(1.2) translateZ(0);
                opacity: 0; }
        45%   { transform: translateY(-80px) rotate(-15deg) scale(1.2) translateZ(0);
                opacity: 0; }
        /* 45–65%: spring drop with overshoot then settle */
        57%   { transform: translateY(8px) rotate(2deg) scale(0.99) translateZ(0);
                opacity: 1; }
        61%   { transform: translateY(-3px) rotate(-1deg) scale(1.005) translateZ(0);
                opacity: 1; }
        65%   { transform: translateY(0) rotate(0deg) scale(1) translateZ(0);
                opacity: 1; }
        /* 65–75%: rotate back to the home -15° tilt */
        75%   { transform: translateY(0) rotate(-15deg) scale(1) translateZ(0);
                opacity: 1; }
        /* 75–100%: rest */
        100%  { transform: translateY(0) rotate(-15deg) scale(1) translateZ(0);
                opacity: 1; }
      }

      /* worm — Uiverse "pl" by PhilibertGentien */
      .uf-pl, .uf-pl__worm {
        animation-duration: 4s;
        animation-iteration-count: infinite;
      }
      .uf-pl {
        animation-name: uf-bump5;
        animation-timing-function: linear;
        width: 5em; height: 5em;
      }
      .uf-pl__ring { stroke: transparent; transition: stroke 0.3s; }
      .uf-pl__worm {
        animation-name: uf-worm5;
        animation-timing-function: cubic-bezier(0.42, 0.17, 0.75, 0.83);
        filter: drop-shadow(0 0 6px rgba(106, 63, 244, 0.35));
      }
      @keyframes uf-bump5 {
        from, 42%, 46%, 51%, 55%, 59%, 63%, 67%, 71%, 74%, 78%, 81%, 85%, 88%, 92%, to {
          transform: translate(0, 0);
        }
        44% { transform: translate(1.33%, 6.75%); }
        53% { transform: translate(-16.67%, -0.54%); }
        61% { transform: translate(3.66%, -2.46%); }
        69% { transform: translate(-0.59%, 15.27%); }
        76% { transform: translate(-1.92%, -4.68%); }
        83% { transform: translate(9.38%, 0.96%); }
        90% { transform: translate(-4.55%, 1.98%); }
      }
      @keyframes uf-worm5 {
        from { stroke-dashoffset: 10; }
        25%  { stroke-dashoffset: 295; }
        to   { stroke-dashoffset: 1165; }
      }

      @media (prefers-reduced-motion: reduce) {
        .uf-pl, .uf-pl__worm,
        .uf-scan-bar, .uf-scan-bar-blur,
        .uf-word, .uf-grad-cap,
        .uf-bg-blob { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- ════════════════════════════════════════════════════════════════
         Boot splash — same loader as the React UniFlowLoader so the
         handoff is invisible. Theme picked from localStorage so a user
         who toggled to light mode last session sees the light boot.
         Removed by App.tsx once React has mounted (1200ms after boot).
         ════════════════════════════════════════════════════════════════ -->
    <div id="app-loader">
      <div class="uf-loader-stage" id="uf-stage">
        <!-- Atmospheric background blobs (Aurora-flavored in dark; pastel in light) -->
        <div class="uf-bg-layer">
          <div class="uf-bg-blob uf-bg-blob-1"></div>
          <div class="uf-bg-blob uf-bg-blob-2"></div>
          <div class="uf-bg-blob uf-bg-blob-3"></div>
          <div class="uf-bg-blob uf-bg-blob-4"></div>
        </div>

        <div class="uf-loader-block">
          <div class="uf-loader">
            <svg id="uf-grad-cap" class="uf-grad-cap" viewBox="0 0 150 120" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="uf-boot-cap-board" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%"   stop-color="#7B5AFF"/>
                  <stop offset="50%"  stop-color="#6A3FF4"/>
                  <stop offset="100%" stop-color="#5A2AD4"/>
                </linearGradient>
                <linearGradient id="uf-boot-cap-base" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%"   stop-color="#5A2AD4"/>
                  <stop offset="100%" stop-color="#3D1F8C"/>
                </linearGradient>
                <radialGradient id="uf-boot-tassel-bead" cx="35%" cy="30%" r="65%">
                  <stop offset="0%"   stop-color="#B095FF"/>
                  <stop offset="55%"  stop-color="#6A3FF4"/>
                  <stop offset="100%" stop-color="#5A2AD4"/>
                </radialGradient>
              </defs>
              <path d="M 38 56 L 112 56 L 102 76 L 48 76 Z" fill="url(#uf-boot-cap-base)"/>
              <ellipse cx="75" cy="56" rx="42" ry="3" fill="#3D1F8C" opacity="0.7"/>
              <path d="M 18 48 L 132 48 L 142 60 L 8 60 Z" fill="url(#uf-boot-cap-board)"/>
              <path d="M 24 50 L 126 50 L 130 55 L 20 55 Z" fill="rgba(255,255,255,0.18)"/>
              <path d="M 8 60 L 142 60 L 138 64 L 12 64 Z" fill="#5A2AD4" opacity="0.85"/>
              <circle cx="75" cy="52" r="3" fill="#3D1F8C"/>
              <circle cx="74" cy="51" r="1" fill="#B095FF" opacity="0.7"/>
              <g style="transform-origin: 75px 52px; transform-box: view-box;">
                <path class="uf-tassel-string" d="M 75 52 Q 105 50 128 56 L 128 86" stroke-width="1.8" fill="none" stroke-linecap="round"/>
                <path class="uf-tassel-tuft" d="M 124 84 L 122 96 L 124 98 L 126 98 L 128 96 L 130 96 L 132 98 L 134 96 L 132 84 Z" opacity="0.95"/>
                <line x1="124" y1="86" x2="123" y2="95" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
                <line x1="128" y1="86" x2="128" y2="96" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
                <line x1="132" y1="86" x2="133" y2="95" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
                <circle cx="128" cy="100" r="4" fill="url(#uf-boot-tassel-bead)"/>
                <circle cx="126.5" cy="98.5" r="1.2" fill="rgba(255,255,255,0.7)"/>
              </g>
            </svg>
            <div class="uf-scan-bar-blur" id="uf-scan-blur"></div>
            <div class="uf-scan-bar" id="uf-scan-bar"></div>
            <span class="uf-word" id="uf-word"><span class="uf-purple">Uni</span><span class="uf-fg">Flow</span><span class="uf-purple uf-dot">.</span></span>
          </div>

          <svg class="uf-pl" viewBox="0 0 128 128" width="128" height="128" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="uf-boot-worm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#7B5AFF"/>
                <stop offset="50%"  stop-color="#6A3FF4"/>
                <stop offset="100%" stop-color="#5A2AD4"/>
              </linearGradient>
            </defs>
            <circle class="uf-pl__ring" cx="64" cy="64" r="56" fill="none" stroke-width="16" stroke-linecap="round"/>
            <path class="uf-pl__worm"
                  d="M92,15.492S78.194,4.967,66.743,16.887c-17.231,17.938-28.26,96.974-28.26,96.974L119.85,59.892l-99-31.588,57.528,89.832L97.8,19.349,13.636,88.51l89.012,16.015S81.908,38.332,66.1,22.337C50.114,6.156,36,15.492,36,15.492a56,56,0,1,0,56,0Z"
                  fill="none" stroke="url(#uf-boot-worm-grad)" stroke-width="16"
                  stroke-linecap="round" stroke-linejoin="round"
                  stroke-dasharray="44 1111" stroke-dashoffset="10"/>
          </svg>
        </div>
      </div>
    </div>

    <script>
      // One-shot setup. CSS keyframes drive the animation — this script only
      // (1) picks dark/light mode from localStorage before first paint,
      // (2) reads the cached brand config (written by BrandContext) and
      //     skins the splash colors + wordmark text accordingly,
      // (3) measures the wordmark's actual rendered width and writes it to
      //     a CSS variable so the scan bar sweeps the exact letter span.
      // No rAF, no per-frame work — nothing to stutter.
      (function(){
        var stage = document.getElementById('uf-stage');
        var word  = document.getElementById('uf-word');
        var cap   = document.getElementById('uf-grad-cap');
        var scanBar  = document.getElementById('uf-scan-bar');
        var scanBlur = document.getElementById('uf-scan-blur');

        // --- (1) dark/light mode ---
        var isDark = true;
        try {
          var saved = localStorage.getItem('darkMode');
          isDark = saved === null ? true : JSON.parse(saved);
          if (!isDark && stage) stage.classList.add('uf-light');
        } catch (e) { /* localStorage blocked → default to dark */ }

        // --- (2) brand skin from localStorage ---
        // BrandContext writes `uniflowBrand` on every brand change
        // (see frontend/src/context/BrandContext.tsx). Shape:
        //   { productName, light: BrandTheme, dark: BrandTheme }
        // Each theme has brandPrimary / brandSecondary / brandAccent / canvasBg
        // and optional logoSegments [{ text, color }].
        // If the brand isn't cached yet (first-ever cold start), defaults
        // baked into the CSS keep working.
        var productName = 'UniFlow.';
        var segs = null;     // [{text, color}] or null = default split
        var primary, secondary, accent;
        try {
          var raw = localStorage.getItem('uniflowBrand');
          if (raw) {
            var b = JSON.parse(raw);
            if (b && typeof b.productName === 'string' && b.productName.length) {
              productName = b.productName;
            }
            var theme = (isDark ? b.dark : b.light) || b.dark || b.light;
            if (theme) {
              primary   = theme.brandPrimary;
              secondary = theme.brandSecondary;
              accent    = theme.brandAccent;
              if (Array.isArray(theme.logoSegments) && theme.logoSegments.length) {
                segs = theme.logoSegments;
              }
            }
          }
        } catch (e) { /* malformed cache → use defaults */ }

        // Apply colors to the CSS vars on the stage element. These cascade
        // to the scan bar bg / glow, the cap gradient stops aren't reached
        // (they're SVG <stop> elements — re-styled below if brand changed).
        if (stage && primary) {
          stage.style.setProperty('--uf-purple-light', accent || primary);
          stage.style.setProperty('--uf-purple-mid',   primary);
          stage.style.setProperty('--uf-purple-deep',  secondary || primary);
